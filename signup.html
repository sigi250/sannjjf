<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Start Free Trial | MAT LEADS AI PRO X</title>
    <meta name="description" content="Start your MAT LEADS AI PRO X trial and build a high-value Google Maps lead pipeline.">
    <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-visual">
        <a class="brand" href="/index.html"><img src="/assets/logo-mark.svg" alt="" width="34" height="34"><span>MAT LEADS AI PRO X</span></a>
        <h1>Launch an agency lead engine in minutes.</h1>
        <p>Search Google Maps, qualify websites, generate proposals, and track deals from one workspace.</p>
      </section>
      <section class="auth-panel">
        <h2>Start Free Trial</h2>
        <p>Create your workspace.</p>
        <form data-auth-form="register">
          <div class="field">
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
          </div>
          <button class="btn btn-primary" type="submit">Create Workspace</button>
          <div class="notice" data-form-status role="status">Free trial includes 2 lead searches with up to 5 leads per search.</div>
          <a class="btn btn-ghost" href="/login.html">Already have an account</a>
        </form>
      </section>
    </main>
    <script type="module" src="/components/layout.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
