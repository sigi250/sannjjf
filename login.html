<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MAT LEADS AI PRO X</title>
    <meta name="description" content="Access your MAT LEADS AI PRO X lead generation dashboard.">
    <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-visual">
        <a class="brand" href="/index.html"><img src="/assets/logo-mark.svg" alt="" width="34" height="34"><span>MAT LEADS AI PRO X</span></a>
        <h1>Turn local search into qualified pipeline.</h1>
        <p>Secure access for lead discovery, AI audits, CRM management, and revenue reporting.</p>
      </section>
      <section class="auth-panel">
        <h2>Login</h2>
        <p>Continue to your workspace.</p>
        <form data-auth-form="login">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" value="" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
          <div class="notice" data-form-status role="status">Free trial accounts get 2 lead searches with up to 5 leads per search.</div>
          <a class="btn btn-ghost" href="/signup.html">Create account</a>
        </form>
      </section>
    </main>
    <script type="module" src="/components/layout.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
